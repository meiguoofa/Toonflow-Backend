services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    # 仅绑宿主机回环口 127.0.0.1:15432(避开宿主机已有的 postgres on 5432),
    # 公网不可达;远程调试请走 SSH 隧道(Navicat → 勾选 SSH 隧道,
    # 主机填 localhost,端口 15432)。
    # 容器内部仍是 5432,backend 通过 docker 内网 PG_HOST=postgres 连接,不受影响。
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # 所有环境变量（PG_* / PORT / JWT_SECRET / TOS_*）从 .env 注入。
    # .env 由 .env.production.example 复制而来，不进仓库。
    env_file:
      - .env
    ports:
      - "4000:4000"

volumes:
  pgdata:
