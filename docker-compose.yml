services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    # 不对宿主/公网暴露 5432，仅 docker 内部网络访问。
    # 如需临时远程调试可改为 "127.0.0.1:5432:5432" 仅绑回环。
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # 所有环境变量（PG_* / PORT / JWT_SECRET / TOS_*）从 .env 注入。
    # .env 由 .env.production.example 复制而来，不进仓库。
    env_file:
      - .env
    ports:
      - "4000:4000"

volumes:
  pgdata:
